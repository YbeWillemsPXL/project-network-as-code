hostname: R2

interfaces:
  - name: "0/0/0"
    description: "Trunk to SW2"
    enabled: true
    no_ip: true

  - name: "0/0/0.20"
    description: "VLAN 20 Site-B Clients"
    encapsulation_vlan: 20
    ip: "10.20.20.1"
    mask: "255.255.255.0"
    enabled: true

  - name: "0/0/0.99"
    description: "VLAN 99 Site-B Management"
    encapsulation_vlan: 99
    ip: "10.99.2.1"
    mask: "255.255.255.0"
    enabled: true

  - name: "0/0/1"
    description: "Link to R1"
    ip: "192.168.12.2"
    mask: "255.255.255.252"
    enabled: true

loopbacks:
  - name: "0"
    ip: "2.2.2.2"
    mask: "255.255.255.255"

ospf:
  process_id: 1
  router_id: "2.2.2.2"
  networks:
    - prefix: "2.2.2.2"
      wildcard: "0.0.0.0"
      area: 0
    - prefix: "192.168.12.0"
      wildcard: "0.0.0.3"
      area: 0
    - prefix: "10.99.2.0"
      wildcard: "0.0.0.255"
      area: 0
    - prefix: "10.20.20.0"
      wildcard: "0.0.0.255"
      area: 0
