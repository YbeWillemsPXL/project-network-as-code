hostname: R1

# Note: GigabitEthernet0/0/0 is a physical trunk to SW1.
# It has no L3 itself — IPs live on sub-interfaces.
interfaces:
  - name: "0/0/0"
    description: "Trunk to SW1"
    enabled: true
    no_ip: true              # tells deploy.py to skip <ip> on this interface

  - name: "0/0/0.10"
    description: "VLAN 10 Site-A Clients"
    encapsulation_vlan: 10
    ip: "10.10.10.1"
    mask: "255.255.255.0"
    enabled: true

  - name: "0/0/0.99"
    description: "VLAN 99 Site-A Management"
    encapsulation_vlan: 99
    ip: "10.99.1.1"
    mask: "255.255.255.0"
    enabled: true

  - name: "0/0/1"
    description: "Link to R2"
    ip: "192.168.12.1"
    mask: "255.255.255.252"
    enabled: true

loopbacks:
  - name: "0"
    ip: "1.1.1.1"
    mask: "255.255.255.255"

ospf:
  process_id: 1
  router_id: "1.1.1.1"
  networks:
    - prefix: "1.1.1.1"
      wildcard: "0.0.0.0"
      area: 0
    - prefix: "192.168.12.0"
      wildcard: "0.0.0.3"
      area: 0
    - prefix: "10.99.1.0"
      wildcard: "0.0.0.255"
      area: 0
    - prefix: "10.10.10.0"
      wildcard: "0.0.0.255"
      area: 0
